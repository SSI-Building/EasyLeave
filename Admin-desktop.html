<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Leave Dashboard - Modern UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --success: #10b981;
            --warning: #f43f5e;
            --bg: #f8f9fc;
            --text-main: #2b2d42;
            --text-muted: #8d99ae;
            --card-bg: #ffffff;
            --border: #edf2f7;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar - ส่วนควบคุมด้านซ้าย */
        .sidebar {
            width: 300px;
            background: white;
            border-right: 1px solid var(--border);
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            box-sizing: border-box;
            z-index: 100;
        }

        /* ปุ่มย้อนกลับ */
        .back-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: var(--primary);
            transform: translateX(-5px);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--primary);
            margin-bottom: 50px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        label { 
            font-size: 14px; 
            color: var(--text-muted);
            margin-bottom: -10px;
        }

        select {
            padding: 14px;
            border-radius: 12px;
            border: 2px solid var(--border);
            font-family: 'Prompt';
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            background-color: #fcfdfe;
            cursor: pointer;
        }

        select:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.1); }

        button.btn-refresh {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s ease;
        }

        button.btn-refresh:hover { background: var(--secondary); transform: translateY(-2px); }

        /* Main Content - ส่วนแสดงผล Dashboard */
        .main-content {
            margin-left: 300px;
            flex: 1;
            padding: 50px 60px;
            max-width: 1200px;
        }

        .page-header {
            margin-bottom: 45px;
        }

        .page-header h2 { font-size: 28px; margin-bottom: 8px; margin-top: 0; }

        /* Grid Layout สำหรับ Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            margin-bottom: 35px;
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.02);
            border: 1px solid rgba(0,0,0,0.03);
        }

        .card h3 { margin-top: 0; margin-bottom: 25px; font-size: 20px; }

        .info-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            color: var(--text-muted);
        }

        .info-value {
            font-size: 26px;
            font-weight: 600;
            color: var(--primary);
        }

        /* Table Style */
        .table-container {
            overflow: hidden;
            border-radius: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8fafc;
            padding: 16px;
            font-weight: 500;
            color: var(--text-muted);
            font-size: 14px;
            text-align: left;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid #f1f5f9;
        }

        .badge-remain { color: var(--success); font-weight: 600; }
        .badge-used { color: var(--warning); font-weight: 600; }

        .loading-shimmer {
            text-align: center;
            padding: 40px 0;
            color: var(--text-muted);
            font-style: italic;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>

<body>

    <aside class="sidebar">
        <a href="Dashboard-admin.html" class="back-link">
            <i data-lucide="arrow-left" size="18"></i>
            <span>ย้อนกลับหน้าหลัก</span>
        </a>

        <div class="logo-area">
            <i data-lucide="shield-check" size="32"></i>
            <h3 style="margin:0; letter-spacing: 1px;">LEAVE ADMIN</h3>
        </div>

        <div class="control-group">
            <label>เลือกพนักงานเพื่อดูสิทธิ</label>
            <select id="employeeSelect">
                <option value="">-- เลือกพนักงาน --</option>
            </select>

            <button class="btn-refresh" onclick="loadEmployeeList()">
                <i data-lucide="refresh-cw" size="18"></i> อัปเดตรายชื่อ
            </button>
        </div>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <h2 id="headerTitle">Dashboard ตรวจสอบการลา</h2>
            <p style="color: var(--text-muted); margin: 0;">เรียกดูข้อมูลสิทธิคงเหลือและประวัติการลาแบบ Real-time</p>
        </div>

        <div class="stats-grid">
            <div class="card">
                <div class="info-header">
                    <i data-lucide="user" size="20"></i>
                    <span>ชื่อพนักงาน</span>
                </div>
                <div class="info-value" id="empName">ยังไม่ได้เลือก</div>
            </div>
            <div class="card">
                <div class="info-header">
                    <i data-lucide="briefcase" size="20"></i>
                    <span>อายุงานปัจจุบัน</span>
                </div>
                <div class="info-value" id="workAge">-</div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h3 style="margin:0;">สิทธิลาคงเหลือ</h3>
                    <span style="background: rgba(16,185,129,0.1); color: var(--success); padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;">Available</span>
                </div>
                <div class="table-container">
                    <table id="remainTable">
                        <thead>
                            <tr>
                                <th>ประเภท</th>
                                <th>วัน</th>
                                <th>ชม.</th>
                                <th>นาที</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td colspan="4" style="text-align:center; color:#cbd5e1; padding: 40px 0;">โปรดเลือกรายชื่อพนักงาน</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h3 style="margin:0;">สิทธิที่ใช้ไป</h3>
                    <span style="background: rgba(244,63,94,0.1); color: var(--warning); padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;">Taken</span>
                </div>
                <div class="table-container">
                    <table id="usedTable">
                        <thead>
                            <tr>
                                <th>ประเภท</th>
                                <th>วัน</th>
                                <th>ชม.</th>
                                <th>นาที</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td colspan="4" style="text-align:center; color:#cbd5e1; padding: 40px 0;">โปรดเลือกรายชื่อพนักงาน</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // เรียกใช้ Icons
        lucide.createIcons();

        // API Links
        const EMP_API="https://script.google.com/macros/s/AKfycbyxbbP1-GJdavLejrM8Yi-w0Q_c4BFj0V-Nliv52fV_Vhen7rpZenq5t5gwwTsFtBzT_A/exec";
        const BALANCE_API="https://script.google.com/macros/s/AKfycbwl2fhFIT6ZqVMb4YVQBjybIyRkzeSr3zXGpz-YE-ArsYTTidvAPqyQ5nOw9D0zMOVIew/exec";

        const employeeSelect = document.getElementById("employeeSelect");
        const empName = document.getElementById("empName");
        const workAge = document.getElementById("workAge");
        const remainTable = document.getElementById("remainTable").querySelector('tbody');
        const usedTable = document.getElementById("usedTable").querySelector('tbody');

        // ฟังก์ชันคำนวณเวลา
        function formatMinutes(min){
            min = Number(min) || 0;
            let days = Math.floor(min/480);
            let hours = Math.floor((min%480)/60);
            let minutes = min%60;
            return {days, hours, minutes};
        }

        // โหลดรายชื่อพนักงาน
        async function loadEmployeeList(){
            employeeSelect.innerHTML = "<option>กำลังโหลดรายชื่อ...</option>";
            try {
                const res = await fetch(EMP_API);
                const data = await res.json();
                employeeSelect.innerHTML = '<option value="">-- เลือกพนักงาน --</option>';
                data.forEach(emp => {
                    const opt = document.createElement("option");
                    opt.value = emp.lineId;
                    opt.textContent = emp.name;
                    employeeSelect.appendChild(opt);
                });
            } catch(err) {
                employeeSelect.innerHTML = "<option>โหลดไม่สำเร็จ</option>";
            }
        }

        // เมื่อเลือกพนักงาน
        employeeSelect.addEventListener("change", async function(){
            const userId = this.value;
            if(!userId) return;

            empName.textContent = this.selectedOptions[0].textContent;
            remainTable.innerHTML = "<tr><td colspan='4' class='loading-shimmer'>กำลังดึงข้อมูลสิทธิ...</td></tr>";
            usedTable.innerHTML = "<tr><td colspan='4' class='loading-shimmer'>กำลังดึงข้อมูลประวัติ...</td></tr>";

            try {
                const res = await fetch(`${BALANCE_API}?userId=${userId}`);
                const data = await res.json();

                workAge.textContent = data.work_age || "-";
                
                renderTable(remainTable, [
                    {label: "ลาพักร้อน", val: data.remain_vacation},
                    {label: "ลาป่วย", val: data.remain_sick},
                    {label: "ลากิจ", val: data.remain_business}
                ], "badge-remain");

                renderTable(usedTable, [
                    {label: "ลาพักร้อน", val: data.used_vacation},
                    {label: "ลาป่วย", val: data.used_sick},
                    {label: "ลากิจ", val: data.used_business}
                ], "badge-used");

            } catch(err) {
                remainTable.innerHTML = "<tr><td colspan='4' style='text-align:center; color:red; padding:20px;'>เกิดข้อผิดพลาดในการโหลดข้อมูล</td></tr>";
                usedTable.innerHTML = "<tr><td colspan='4' style='text-align:center; color:red; padding:20px;'>เกิดข้อผิดพลาดในการโหลดข้อมูล</td></tr>";
            }
        });

        // ฟังก์ชันแสดงผลตาราง
        function renderTable(tableElem, dataArr, badgeClass) {
            tableElem.innerHTML = "";
            dataArr.forEach(item => {
                const t = formatMinutes(item.val);
                tableElem.innerHTML += `<tr>
                    <td style="font-weight:500;">${item.label}</td>
                    <td class="${badgeClass}">${t.days}</td>
                    <td>${t.hours}</td>
                    <td>${t.minutes}</td>
                </tr>`;
            });
        }

        // เริ่มต้นโหลดข้อมูล
        loadEmployeeList();
    </script>
</body>
</html>
