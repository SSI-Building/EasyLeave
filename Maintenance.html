<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กำลังอัปเกรดระบบ - กลับมาเร็ว ๆ นี้</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #3b82f6;
            --accent: #10b981;
            --text: #0f172a;
            --gray: #475569;
            --bg-start: #e0f2fe;
            --bg-end: #dbeafe;
        }
        body {
            margin: 0;
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            overflow-x: hidden;
        }
        .container {
            text-align: center;
            padding: 40px 30px;
            max-width: 520px;
            width: 92%;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.12);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.4);
            position: relative;
            overflow: hidden;
        }
        .container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, rgba(37,99,235,0.08) 0%, transparent 50%, rgba(16,185,129,0.06) 100%);
            pointer-events: none;
        }
        .icon-box {
            width: 110px;
            height: 110px;
            margin: 0 auto 35px;
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(37,99,235,0.25);
            position: relative;
        }
        .icon-box i {
            font-size: 48px;
            color: white;
            animation: rotateGear 10s linear infinite, pulse 3s ease-in-out infinite;
        }
        @keyframes rotateGear {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0.85; }
        }
        h1 {
            font-size: 2.1rem;
            font-weight: 700;
            margin: 0 0 18px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .message {
            font-size: 1.15rem;
            color: var(--gray);
            line-height: 1.7;
            margin-bottom: 30px;
        }
        .date-box {
            display: inline-block;
            background: rgba(16,185,129,0.1);
            color: var(--accent);
            padding: 12px 28px;
            border-radius: 999px;
            font-weight: 600;
            font-size: 1.1rem;
            margin: 20px 0 35px;
            border: 1px solid rgba(16,185,129,0.3);
        }
        .progress-section {
            margin: 40px 0 30px;
        }
        .progress-label {
            font-size: 1rem;
            color: var(--gray);
            margin-bottom: 12px;
        }
        .progress-bar {
            height: 12px;
            background: #e2e8f0;
            border-radius: 999px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 78%; /* ปรับ % ได้ตามความคืบหน้า */
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 999px;
            transition: width 1.5s ease;
        }
        .countdown {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--primary);
            margin-top: 20px;
        }
        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .message { font-size: 1.05rem; }
            .icon-box { width: 90px; height: 90px; }
            .icon-box i { font-size: 42px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon-box">
        <i class="fas fa-tools"></i>
    </div>

    <h1>ระบบอยู่ระหว่างปรับปรุง</h1>
    
    <p class="message">
        ขออภัยในความไม่สะดวก ผู้ใช้สามารถส่งใบลาย้อนหลังได้หากระบบกลับมาใช้งานได้ปกติ 🙏
    </p>

    <div class="date-box">
        เตรียมกลับมาให้บริการวันที่ <strong>10 มีนาคม 2569 เวลา 17:00 น.</strong>
    </div>

    <div class="progress-section">
        <div class="progress-label">ความคืบหน้าการอัปเดต</div>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
    </div>

    <!-- Countdown ตัวอย่าง (ปรับ targetDate ได้) -->
    <div class="countdown" id="countdown"></div>
</div>

<script>
    // Countdown ถึง 20 มี.ค. 2569 (ปรับได้)
    const targetDate = new Date("2026-03-10T00:00:00+07:00").getTime();

    function updateCountdown() {
        const now = new Date().getTime();
        const distance = targetDate - now;

        if (distance < 0) {
            document.getElementById("countdown").innerHTML = "ระบบกลับมาแล้ว!";
            return;
        }

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("countdown").innerHTML = 
            `${days} วัน ${hours} ชม. ${minutes} นาที ${seconds} วินาที`;
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();
</script>

</body>
</html>
