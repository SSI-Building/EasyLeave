<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบปิดปรับปรุงชั่วคราว</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #1994b6;
            --secondary-color: #36a761;
            --text-color: #333;
            --bg-color: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-color);
        }

        .card {
            text-align: center;
            padding: 50px 30px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            max-width: 450px;
            width: 85%;
            border-top: 8px solid var(--primary-color);
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: rgba(25, 148, 182, 0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 25px;
        }

        .icon-circle i {
            font-size: 35px;
            color: var(--primary-color);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            margin: 0 0 15px 0;
            color: var(--text-color);
        }

        p {
            font-size: 16px;
            color: #64748b;
            line-height: 1.6;
            margin: 0;
        }

        .highlight {
            color: var(--secondary-color);
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="icon-circle">
        <i class="fas fa-tools"></i>
    </div>
    
    <h1>ขออภัย! ระบบปิดปรับปรุงชั่วคราว</h1>
    <p>
        เรากำลังอัปเดตระบบเพื่อให้ใช้งานได้ดียิ่งขึ้น<br>
        <span class="highlight">คาดว่าจะกลับมาใช้งานได้ในเร็วๆ นี้</span>
    </p>
</div>

</body>
</html>
